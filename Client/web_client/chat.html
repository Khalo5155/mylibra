<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部标题 + 连接状态 */
        .chat-header {
            background: #fff;
            padding: 22px 28px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .connection-status {
            font-size: 14px;
            font-weight: normal;
            display: flex;
            align-items: center;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .online {
            background: #00b42a;
        }

        .offline {
            background: #f53f3f;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: #fdfdfd;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #e0e0e0;
            border-radius: 3px;
        }

        /* 消息气泡 */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .bot-message {
            align-self: flex-start;
            background-color: #f1f3f4;
            color: #333;
        }

        .user-message {
            align-self: flex-end;
            background-color: #4e8cff;
            color: #fff;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .message-role {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            font-style: italic;
            font-weight: 500;
        }

        .user-message .message-role {
            color: rgba(255, 255, 255, 0.7);
        }

        .user-message .message-time {
            color: rgba(255,255,255,0.8);
        }

        /* 输入框 */
        .chat-input {
            display: flex;
            padding: 20px 28px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            gap: 12px;
        }

        #message-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
        }

        #message-input:focus {
            border-color: #4e8cff;
        }

        #send-btn {
            padding: 14px 24px;
            background: #4e8cff;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
        }

        #send-btn:hover {
            background: #3b7bff;
        }

        #send-btn:disabled {
            background: #b3c7ff;
            cursor: not-allowed;
        }

        .empty-tip {
            text-align: center;
            color: #bbb;
            margin-top: 40px;
        }

        /* 音频播放按钮 */
        .audio-play {
            margin-left: 8px;
            cursor: pointer;
            color: #4e8cff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div>
            <span>Mylibra Chatbot</span>
            <div id="bot-role-display" style="font-size: 13px; color: #666; margin-top: 4px; display: none;"></div>
        </div>
        <div class="connection-status">
            <span class="status-dot offline" id="status-dot"></span>
            <span id="status-text">未连接</span>
        </div>
    </div>

    <div class="chat-messages" id="message-container">
        <div class="empty-tip">开始聊天吧！</div>
    </div>

    <div class="chat-input">
        <input type="text" id="message-input" placeholder="输入消息...">
        <button id="send-btn" disabled>发送</button>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script>console.log("importing audio.js")</script>
    <script src="js/audio.js"></script>
    <script>console.log("importing chat.js")</script>
    <script src="js/chat.js"></script>
    <script>console.log("done import")</script>
</body>
</html>
