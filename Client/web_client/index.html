<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能聊天机器人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #f7f8fa;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            /* 新增：主背景直接加透明度，替代伪元素的间接控制 */
            opacity: 1; /* 主容器不透明，避免影响子元素 */
        }

        /* 背景覆盖层（核心修改：调整透明度的叠加方式） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 关键：将背景图移到伪元素，body 仅保留底色，透明度直接作用于伪元素 */
            background-color: #f7f8fa;
            background-image: var(--bg-image, none); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: var(--bg-opacity, 0.3); /* 这里的数值就是背景图的最终透明度 */
            z-index: -1;
            pointer-events: none;
        }

        /* 左侧功能导航 */
        .sidebar {
            width: 20%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-right: 1px solid #f0f0f0;
            padding: 20px 0;
            position: relative;
            z-index: 1;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin: 8px 0;
        }

        .sidebar-menu a {
            display: block;
            padding: 12px 24px;
            color: #333;
            text-decoration: none;
            font-size: 15px;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(78, 140, 255, 0.1);
            color: #4e8cff;
            border-left-color: #4e8cff;
        }

        /* 右侧内容区域容器 */
        .content-area {
            width: 80%;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* 所有iframe共享同一个容器区域 */
        .content-embed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            background: transparent; /* 允许iframe背景透明，显示父级背景 */
        }

        /* 激活的iframe可见 */
        .content-embed.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .content-area {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧功能导航 -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="#" class="active" data-target="chat">聊天页面</a></li>
            <li><a href="#" data-target="setting">配置页面</a></li>
        </ul>
    </div>

    <!-- 右侧嵌入内容：两个iframe并存，切换显示 -->
    <div class="content-area">
        <!-- 聊天页iframe -->
        <iframe src="chat.html" class="content-embed active" frameborder="0" id="iframe-chat" allowtransparency="true"></iframe>
        
        <!-- 配置页iframe -->
        <iframe src="setting.html" class="content-embed" frameborder="0" id="iframe-setting" allowtransparency="true"></iframe>
    </div>

    <script>
        const menuItems = document.querySelectorAll('.sidebar-menu a');
        const iframeChat = document.getElementById('iframe-chat');
        const iframeSetting = document.getElementById('iframe-setting');
        
        menuItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                menuItems.forEach(link => link.classList.remove('active'));
                this.classList.add('active');
                
                const target = this.getAttribute('data-target');
                
                iframeChat.classList.remove('active');
                iframeSetting.classList.remove('active');
                
                if (target === 'chat') {
                    iframeChat.classList.add('active');
                } else if (target === 'setting') {
                    iframeSetting.classList.add('active');
                }
            });
        });

        // 初始化：根据URL hash切换菜单
        window.addEventListener('load', function() {
            const hash = window.location.hash.slice(1) || 'chat';
            menuItems.forEach(item => {
                if (item.getAttribute('data-target') === hash) {
                    item.click();
                }
            });
            
            applySavedBackground();
            
            // 👇 新增：等 iframe 加载完成后同步背景
            document.querySelectorAll('.content-embed').forEach(iframe => {
                iframe.addEventListener('load', function() {
                    const savedBg = localStorage.getItem('bgImage');
                    const savedOpacity = localStorage.getItem('bgOpacity');
                    if (savedBg) {
                        syncBackgroundToIframes(savedBg, parseFloat(savedOpacity || '0.3'));
                    }
                });
            });
        });

        // 监听来自setting.html的消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'updateBackground') {
                applyBackground(event.data.bgImage, event.data.bgOpacity);
            }
            
            // 👇 新增：响应 iframe 的背景请求
            if (event.data && event.data.type === 'requestBackground') {
                const savedBg = localStorage.getItem('bgImage');
                const savedOpacity = localStorage.getItem('bgOpacity');
                if (savedBg) {
                    syncBackgroundToIframes(savedBg, parseFloat(savedOpacity || '0.3'));
                }
            }
        });

        function applyBackground(bgImage, bgOpacity) {
            const body = document.body;
            if (bgImage) {
                body.style.setProperty('--bg-image', `url(${bgImage})`);
                body.style.setProperty('--bg-opacity', bgOpacity);
            } else {
                body.style.setProperty('--bg-image', 'none');
                body.style.setProperty('--bg-opacity', '0');
            }
            
            // 存储逻辑不变
            if (bgImage) {
                localStorage.setItem('bgImage', bgImage);
                localStorage.setItem('bgOpacity', bgOpacity);
            } else {
                localStorage.removeItem('bgImage');
                localStorage.removeItem('bgOpacity');
            }
            
            // 👇 新增：同步背景配置到所有 iframe
            syncBackgroundToIframes(bgImage, bgOpacity);
        }

        // 👇 新增：向所有 iframe 发送背景配置
        function syncBackgroundToIframes(bgImage, bgOpacity) {
            const iframes = document.querySelectorAll('.content-embed');
            iframes.forEach(iframe => {
                try {
                    iframe.contentWindow.postMessage({
                        type: 'updateBackground',
                        bgImage: bgImage,
                        bgOpacity: parseFloat(bgOpacity)
                    }, '*');
                } catch (e) {
                    console.warn('无法向iframe发送背景配置', e);
                }
            });
        }

        function applySavedBackground() {
            const savedBg = localStorage.getItem('bgImage');
            const savedOpacity = localStorage.getItem('bgOpacity');
            if (savedBg) {
                applyBackground(savedBg, parseFloat(savedOpacity || '0.3'));
            }
        }
    </script>
</body>
</html>
